<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoSDK | Professional Meeting</title>
    <link rel="stylesheet" href="./styles/style.css" />
</head>

<body>
    <div class="container">

        <header>
            <h1>VideoSDK Meeting</h1>
            <span class="status-badge">
                User ID: <span id="displayMyId">Connecting...</span>
            </span>
        </header>

        <!-- NAME INPUT -->
        <div class="control-group">
            <label>Your Display Name</label>
            <input type="text" id="userNameInput" placeholder="Enter your name" />
        </div>

        <!-- CONTROLS -->
        <div class="controls-card">

            <div class="control-group">
                <h3>Host a Meeting</h3>
                <button id="createBtn">Generate New Room</button>
                <label>Room ID</label>
                <input type="text" id="createdRoomId" readonly />
            </div>

            <div class="control-group">
                <h3>Join a Meeting</h3>
                <label>Room ID</label>
                <input type="text" id="roomIdInput" placeholder="Paste room ID" />

                <button id="startBtn">Join Call</button>
                <button id="screenBtn" disabled>Start Screen Share</button>
            </div>

            <button id="endBtn" disabled>End Meeting</button>

        </div>

        <!-- SCREEN SHARE STAGE -->
        <div id="screenStage" class="screen-stage hidden">
            <video id="screenVideo" autoplay playsinline></video>
            <div id="screenLabel"></div>
        </div>

        <!-- VIDEOS GRID -->
        <div id="videosContainer">

            <div class="video-card">
                <video id="localVideo" autoplay playsinline muted></video>
                <div class="video-name" id="localVideoName">You</div>
            </div>

        </div>

    </div>

    <script type="module">
        import { MeetingState } from './dist/MeetingState.js';
        import { VideoSDKCore } from './dist/VideoSDKCore.js';

        const meetingState = new MeetingState();

        const localVideo = document.getElementById("localVideo");
        const videosContainer = document.getElementById("videosContainer");

        const screenStage = document.getElementById("screenStage");
        const screenVideo = document.getElementById("screenVideo");
        const screenLabel = document.getElementById("screenLabel");

        const userNameInput = document.getElementById("userNameInput");
        const roomInput = document.getElementById("roomIdInput");
        const createdRoomInput = document.getElementById("createdRoomId");

        const startBtn = document.getElementById("startBtn");
        const createBtn = document.getElementById("createBtn");
        const screenBtn = document.getElementById("screenBtn");
        const localVideoName = document.getElementById("localVideoName");
        const displayId = document.getElementById("displayMyId");

        const endBtn = document.getElementById("endBtn");
        displayId.innerText = localStorage.getItem("vsdk_id") || "Pending";

        const sdk = new VideoSDKCore(
            "wss://rust-video-server.onrender.com/ws",
            meetingState,
            {
                onUserJoined: (p) => {
                    alert(`${p.name || "A new participant"} joined`);
                    createOrUpdateCard(p.id, p.name);
                },

                onTrack: (peerId, kind) => {
                    const active = meetingState.getActiveScreenPeer();

                    if (active === peerId) {
                        const stream = meetingState.getScreenStream(peerId);
                        if (stream) {
                            screenVideo.srcObject = stream;
                            screenStage.classList.remove("hidden");
                        }
                        return;
                    }
                },

                onScreenShareStart: (peerId) => {
                    console.log("[UI] screen share started by", peerId);

                    screenLabel.innerText = `${peerId} is sharing screen...`;
                    screenStage.classList.remove("hidden");

                    // IMPORTANT: clear previous stream
                    screenVideo.srcObject = null;
                },

                onScreenShareStop: (peerId) => {
                    console.log("[UI] screen share stopped by", peerId);

                    screenVideo.srcObject = null;
                    screenStage.classList.add("hidden");
                    screenLabel.innerText = "";
                },

                onUserLeft: (peer) => {
                    alert(`${peer.name || "A participant"} left`);
                    document.getElementById(`card-${peer.id}`)?.remove();
                }
            }
        );

        endBtn.onclick = async () => {
            try {
                // stop screen share if active
                if (sdk.isScreenSharing) {
                    await sdk.stopScreenShare();
                }

                // disconnect from meeting (adjust if your SDK uses a different method)
                if (typeof sdk.disconnect === "function") {
                    await sdk.disconnect();
                }

                // reset UI
                startBtn.disabled = false;
                startBtn.innerText = "Join Call";

                userNameInput.disabled = false;
                roomInput.disabled = false;

                screenBtn.disabled = true;
                endBtn.disabled = true;

                screenVideo.srcObject = null;
                screenStage.classList.add("hidden");

                videosContainer.innerHTML = `
            <div class="video-card">
                <video id="localVideo" autoplay playsinline muted></video>
                <div class="video-name" id="localVideoName">You</div>
            </div>
        `;

                alert("Meeting ended");
            } catch (err) {
                console.error(err);
                alert("Failed to end meeting");
            }
        };
        // ---------------- CARD UI ----------------
        function createOrUpdateCard(id, name) {
            let card = document.getElementById(`card-${id}`);

            if (!card) {
                card = document.createElement("div");
                card.className = "video-card";
                card.id = `card-${id}`;

                const video = document.createElement("video");
                video.autoplay = true;
                video.playsInline = true;

                const label = document.createElement("div");
                label.className = "video-name";

                card.appendChild(video);
                card.appendChild(label);

                videosContainer.appendChild(card);
            }

            card.querySelector(".video-name").textContent = name;
            return card;
        }

        // ---------------- CREATE ROOM ----------------
        createBtn.onclick = async () => {
            const res = await fetch("https://rust-video-server.onrender.com/rooms", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    title: "My Room",
                    created_by: localStorage.getItem("vsdk_id")
                })
            });

            const data = await res.json();

            createdRoomInput.value = data.id;
            roomInput.value = data.id;
        };

        // ---------------- JOIN ROOM ----------------
        startBtn.onclick = async () => {
            const roomId = roomInput.value.trim();
            const name = userNameInput.value.trim() || `User-${displayId?.textContent?.slice(0, 5)}`;

            if (!roomId) {
                alert("Room ID required");
                return;
            }

            localVideoName.innerText = `${name} (You)`;

            await sdk.initLocal(localVideo, name);
            await sdk.connect(roomId, name);

            startBtn.disabled = true;
            startBtn.innerText = "Connected";

            userNameInput.disabled = true;
            roomInput.disabled = true;

            screenBtn.disabled = false;
            endBtn.disabled = false;
        };

        // ---------------- SCREEN SHARE ----------------
        screenBtn.onclick = async () => {
            try {
                if (!sdk.isScreenSharing) {
                    await sdk.startScreenShare();
                    screenBtn.innerText = "Stop Screen Share";
                } else {
                    await sdk.stopScreenShare();
                    screenBtn.innerText = "Start Screen Share";
                }
            } catch (err) {
                console.error(err);
                alert("Screen share failed");
            }
        };
    </script>

</body>

</html>
