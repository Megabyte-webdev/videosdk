<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VideoSDK | Professional Meeting</title>
    <link rel="stylesheet" href="./styles/style.css" />
</head>

<body>
    <div class="container">

        <header>
            <h1>VideoSDK Meeting</h1>
            <span class="status-badge">
                User ID: <span id="displayMyId">Connecting...</span>
            </span>
        </header>

        <!-- NAME INPUT -->
        <div class="control-group">
            <label>Your Display Name</label>
            <input type="text" id="userNameInput" placeholder="Enter your name" />
        </div>

        <!-- CONTROLS -->
        <div class="controls-card">

            <div class="control-group">
                <h3>Host a Meeting</h3>
                <button id="createBtn">Generate New Room</button>

                <label>Room ID</label>
                <input type="text" id="createdRoomId" readonly />
            </div>

            <div class="control-group">
                <h3>Join a Meeting</h3>

                <label>Room ID</label>
                <input type="text" id="roomIdInput" placeholder="Paste room ID" />

                <button id="startBtn">Join Call</button>
                <button id="screenBtn" disabled>
                    Start Screen Share
                </button>
            </div>

            <button id="endBtn" disabled>
                End Meeting
            </button>

        </div>

        <!-- SCREEN SHARE -->
        <div id="screenStage" class="screen-stage hidden">
            <video id="screenVideo" autoplay playsinline></video>
            <div id="screenLabel"></div>
        </div>

        <!-- VIDEOS -->
        <div id="videosContainer">

            <div class="video-card">
                <video id="localVideo" autoplay playsinline muted></video>
                <div class="video-name" id="localVideoName">You</div>
            </div>

        </div>

        <div id="chatPanel" class="chat-panel hidden">
            <div class="chat-header">
                <span>In-call Chat</span>
                <button id="closeChat" aria-label="Close Chat">✖</button>
            </div>

            <div id="chatMessages" class="chat-messages">
            </div>

            <div class="chat-footer">
                <div id="replyBanner" class="reply-banner hidden">
                    <span>Replying to <strong id="replyName"></strong> privately</span>
                    <button id="cancelReply">✖</button>
                </div>
                <div class="chat-input-wrapper">
                    <input type="text" id="chatInput" placeholder="Type a message..." />
                    <button id="sendChatBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <button id="openChatBtn" class="chat-toggle">
            <span class="chat-icon">💬</span>
            <span class="chat-text">Chat</span>
            <span id="chatBadge" class="chat-badge hidden"></span>
        </button>

    </div>

    <script type="module" src="./script/index.js"></script>

</body>

</html>
